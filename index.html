<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Second Brain — Your Retro-Future Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,900&f[]=satoshi@400,700&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    :root {
      --cream: #FFF9ED;
      --coral: #FF6B6B;
      --mustard: #FFB300;
      --teal: #006D77;
      --charcoal: #2D2D2D;
    }

    body {
      font-family: 'Satoshi', sans-serif;
      background-color: var(--cream);
      color: var(--charcoal);
      overflow-x: hidden;
    }

    h1, h2, h3 {
      font-family: 'Cabinet Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: -0.03em;
    }

    .mono {
      font-family: 'Space Mono', monospace;
    }

    .retro-border {
      border: 3px solid var(--charcoal);
    }

    .retro-shadow {
      box-shadow: 6px 6px 0px 0px var(--charcoal);
    }

    .retro-shadow-hover:hover {
      box-shadow: 2px 2px 0px 0px var(--charcoal);
      transform: translate(4px, 4px);
    }

    .grain {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .grid-bg {
      background-image: radial-gradient(var(--charcoal) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.05;
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  
  <div class="min-h-screen relative">
    <div class="absolute inset-0 grid-bg pointer-events-none"></div>

    <header class="relative pt-24 pb-32 px-6 overflow-hidden">
      <div class="absolute top-20 left-10 opacity-20 animate-pulse">
        <iconify-icon icon="lucide:sparkles" class="text-8xl text-[#FFB300]"></iconify-icon>
      </div>
      <div class="absolute bottom-20 right-10 opacity-20 rotate-12">
        <iconify-icon icon="lucide:circle-dot" class="text-9xl text-[#006D77]"></iconify-icon>
      </div>

      <div class="max-w-6xl mx-auto text-center relative z-10">
        <div class="inline-block border-2 border-black bg-white px-4 py-1 font-bold uppercase tracking-widest text-xs mb-8 transform -rotate-2 retro-shadow">
          v1.0.0 — Stable Release
        </div>

        <h1 class="text-6xl md:text-8xl lg:text-[10rem] font-black leading-[0.85] mb-12 italic">
          YOUR <span class="text-[#FF6B6B]">BRAIN</span>,<br>
          BUT ON <span class="text-[#006D77]">TECH.</span>
        </h1>

        <p class="max-w-2xl mx-auto text-xl md:text-2xl font-medium leading-relaxed mb-12 text-[#444]">
          A self-hosted WhatsApp and Telegram AI assistant that captures your chaos and routes it to your digital universe. Text yourself, let the machine organize.
        </p>

        <div class="flex flex-wrap justify-center gap-6">
          <a href="#get-started" class="px-6 py-3 bg-[#FF6B6B] text-white font-bold uppercase border-2 border-black retro-shadow transform hover:-translate-y-1">
            Get Started
          </a>
          <a href="https://github.com/thesaiprasadrao/second-brain" target="_blank" class="px-6 py-3 bg-[#006D77] text-white font-bold uppercase border-2 border-black retro-shadow transform hover:-translate-y-1">
            View GitHub
          </a>
        </div>
      </div>
    </header>
  </div>
</body>
</html>
